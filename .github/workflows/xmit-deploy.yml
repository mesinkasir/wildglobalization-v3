name: Build and Deploy Eleventy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      site:
        description: "XMIT site/domain override"
        required: false
        type: string

concurrency:
  group: eleventy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Eleventy site
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d dist ]; then
            echo "dist directory missing after build" >&2
            exit 1
          fi
          ls -1 dist | head -n 20

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: eleventy-dist
          path: dist

  deploy:
    name: Deploy to XMIT
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      XMIT_SITE: ${{ inputs.site || vars.XMIT_SITE || 'wildglobalization.xmit.dev' }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: eleventy-dist
          path: dist

      - name: Deploy to XMIT (CLI)
        env:
          XMIT_KEY: ${{ secrets.XMIT_KEY }}
        run: |
          if [ -z "$XMIT_KEY" ]; then
            echo "XMIT_KEY secret is not set" >&2
            exit 1
          fi
          if [ -z "$XMIT_SITE" ]; then
            echo "XMIT site/domain not provided. Set repo variable XMIT_SITE or pass the workflow_dispatch site input." >&2
            exit 1
          fi
          echo "Deploying dist to $XMIT_SITE via XMIT CLI"
          npx -y @xmit.co/xmit "$XMIT_SITE" dist

      - name: Post-deploy summary
        run: |
          echo "Deployment attempt finished for $XMIT_SITE"
          echo "Visit: https://$XMIT_SITE"
